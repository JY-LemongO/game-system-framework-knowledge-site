name: Deploy production and QA preview

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  resolve_revisions:
    runs-on: ubuntu-24.04
    outputs:
      main_sha: ${{ steps.revisions.outputs.main_sha }}
      dev_sha: ${{ steps.revisions.outputs.dev_sha }}

    steps:
      - name: Resolve production revision
        uses: actions/checkout@v6
        with:
          ref: main
          path: refs/main
          persist-credentials: false

      - name: Resolve preview revision
        uses: actions/checkout@v6
        with:
          ref: dev
          path: refs/dev
          persist-credentials: false

      - name: Freeze branch revisions
        id: revisions
        shell: bash
        run: |
          echo "main_sha=$(git -C refs/main rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "dev_sha=$(git -C refs/dev rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  qa:
    name: QA ${{ matrix.target }}
    needs: resolve_revisions
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: production
            ref: ${{ needs.resolve_revisions.outputs.main_sha }}
          - target: preview
            ref: ${{ needs.resolve_revisions.outputs.dev_sha }}
    uses: ./.github/workflows/qa.yml
    with:
      ref: ${{ matrix.ref }}
      target: ${{ matrix.target }}

  deploy:
    needs:
      - resolve_revisions
      - qa
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out production
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_revisions.outputs.main_sha }}
          path: production
          persist-credentials: false

      - name: Check out QA preview
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_revisions.outputs.dev_sha }}
          path: preview
          persist-credentials: false

      - name: Assemble production and preview
        shell: bash
        run: |
          mkdir -p dist/preview
          rsync -a --exclude='.git' --exclude='.github' production/ dist/
          rsync -a --exclude='.git' --exclude='.github' preview/ dist/preview/
          touch dist/.nojekyll

      - name: Record deployed revisions
        shell: bash
        env:
          MAIN_SHA: ${{ needs.resolve_revisions.outputs.main_sha }}
          DEV_SHA: ${{ needs.resolve_revisions.outputs.dev_sha }}
        run: |
          built_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          write_metadata() {
            root="$1"
            branch="$2"
            commit_sha="$3"
            output="$4"
            release_version="$(tr -d '\r\n' < "$root/VERSION")"
            runtime_version="$(grep -m1 'const RUNTIME_VERSION =' "$root/source/runtime/runtime-kernel.js" | cut -d "'" -f 2)"
            test -n "$release_version" && test -n "$runtime_version"
            printf '{\n  "releaseVersion": "%s",\n  "runtimeVersion": "%s",\n  "branch": "%s",\n  "commitSha": "%s",\n  "builtAt": "%s"\n}\n' \
              "$release_version" "$runtime_version" "$branch" "$commit_sha" "$built_at" > "$output"
          }

          # 검증한 두 커밋의 식별 정보를 각 배포 루트에 고정한다.
          write_metadata production main "$MAIN_SHA" dist/build-metadata.json
          write_metadata preview dev "$DEV_SHA" dist/preview/build-metadata.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
